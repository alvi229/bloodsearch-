<!doctype html>
<html lang="bn" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Donor Search</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Hind Siliguri', sans-serif; }
    .tab-active { background: #dc2626; color: white; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220,38,38,0.15); }
  </style>
</head>
<body class="h-full bg-gray-50">

  <!-- Header -->
  <header class="bg-gradient-to-r from-red-700 to-red-900 text-white py-8 px-4 text-center">
    <h1 class="text-3xl md:text-4xl font-bold">🩸 Blood Donor Search</h1>
    <p class="text-red-200 text-lg">জীবন বাঁচান, রক্ত দিন</p>
  </header>

  <!-- Stats -->
  <div class="max-w-4xl mx-auto -mt-6 px-4">
    <div class="bg-white rounded-xl shadow-lg p-4 flex justify-around">
      <div class="text-center">
        <p id="donor-count" class="text-3xl font-bold text-red-600">0</p>
        <p class="text-gray-500 text-sm">মোট ডোনার</p>
      </div>
      <div class="text-center">
        <p id="helped-count" class="text-3xl font-bold text-green-600">0</p>
        <p class="text-gray-500 text-sm">সহায়তা পেয়েছে</p>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="max-w-4xl mx-auto px-4 mt-6">
    <div class="flex rounded-lg overflow-hidden border border-gray-200 bg-white">
      <button onclick="switchTab('search')" id="tab-search" class="flex-1 py-3 font-semibold tab-active">🔍 রক্ত খুঁজুন</button>
      <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-3 font-semibold text-gray-600">📝 রেজিস্ট্রেশন</button>
    </div>
  </div>

  <!-- Search Panel -->
  <div id="panel-search" class="max-w-4xl mx-auto px-4 mt-6 pb-8">
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <select id="search-blood" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
          <option value="">সব ব্লাড গ্রুপ</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
        <input id="search-district" type="text" placeholder="জেলা (যেমন: ঢাকা)" class="border p-3 rounded-lg">
        <input id="search-thana" type="text" placeholder="থানা" class="border p-3 rounded-lg">
        
        <!-- অটো লোকেশন বাটন -->
        <button id="loc-btn" onclick="window.useCurrentLocation()" class="bg-blue-600 text-white p-3 rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-blue-700 transition">
          📍 লোকেশন দিয়ে খুঁজুন
        </button>
      </div>
      <button onclick="window.searchDonors()" class="mt-4 w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">খুঁজুন</button>
    </div>
    <div id="search-results" class="space-y-4"></div>
  </div>

  <!-- Register Panel -->
  <div id="panel-register" class="max-w-4xl mx-auto px-4 mt-6 pb-8 hidden">
    <form id="reg-form" class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="text-xl font-bold mb-4">ডোনার হিসেবে নাম লিখুন</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="reg-name" placeholder="আপনার নাম *" required class="border p-3 rounded-lg">
        <select id="reg-blood" required class="border p-3 rounded-lg">
          <option value="">ব্লাড গ্রুপ নির্বাচন করুন *</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select id="reg-division" required class="border p-3 rounded-lg">
            <option value="">বিভাগ নির্বাচন করুন *</option>
            <option>ঢাকা</option><option>চট্টগ্রাম</option><option>রাজশাহী</option><option>খুলনা</option>
            <option>বরিশাল</option><option>সিলেট</option><option>রংপুর</option><option>ময়মনসিংহ</option>
        </select>
        <input id="reg-district" placeholder="জেলা *" required class="border p-3 rounded-lg">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="reg-thana" placeholder="থানা" class="border p-3 rounded-lg">
        <input id="reg-phone" type="tel" placeholder="ফোন নম্বর *" required class="border p-3 rounded-lg">
      </div>
      <input id="reg-facebook" placeholder="ফেসবুক প্রোফাইল লিংক (ঐচ্ছিক)" class="border p-3 rounded-lg w-full">
      <button type="submit" id="reg-btn" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">রেজিস্ট্রেশন সম্পন্ন করুন</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJYiRB29zVMIK3-PCLLFC7Olje1t3S0Z8",
      authDomain: "blood-donor-app-a1a64.firebaseapp.com",
      databaseURL: "https://blood-donor-app-a1a64-default-rtdb.firebaseio.com",
      projectId: "blood-donor-app-a1a64",
      storageBucket: "blood-donor-app-a1a64.firebasestorage.app",
      messagingSenderId: "4625834490",
      appId: "1:4625834490:web:70882f8df31f75571e8443"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.allDonors = [];

    // ট্যাব পরিবর্তন
    window.switchTab = function(tab) {
      document.getElementById('panel-search').classList.toggle('hidden', tab !== 'search');
      document.getElementById('panel-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-search').className = tab === 'search' ? 'flex-1 py-3 font-semibold tab-active' : 'flex-1 py-3 font-semibold text-gray-600';
      document.getElementById('tab-register').className = tab === 'register' ? 'flex-1 py-3 font-semibold tab-active' : 'flex-1 py-3 font-semibold text-gray-600';
    };

    // অটো-লোকেশন ফিচার
    window.useCurrentLocation = function() {
      if (navigator.geolocation) {
        const locBtn = document.getElementById('loc-btn');
        locBtn.innerText = "খোঁজা হচ্ছে...";
        
        navigator.geolocation.getCurrentPosition(async (position) => {
          try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
            const data = await res.json();
            const district = data.address.district || data.address.state_district || data.address.city || "";
            
            if(district) {
              document.getElementById('search-district').value = district.replace(" District", "");
              window.searchDonors();
            }
          } catch (e) {
            alert("লোকেশন পাওয়া যায়নি।");
          } finally {
            locBtn.innerHTML = "📍 লোকেশন দিয়ে খুঁজুন";
          }
        }, () => {
          alert("লোকেশন পারমিশন দিন।");
          locBtn.innerHTML = "📍 লোকেশন দিয়ে খুঁজুন";
        });
      }
    };

    // রেজিস্ট্রেশন
    const regForm = document.getElementById('reg-form');
    regForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      btn.disabled = true;
      btn.innerText = "অপেক্ষা করুন...";

      const donorData = {
        name: document.getElementById('reg-name').value,
        blood: document.getElementById('reg-blood').value,
        phone: document.getElementById('reg-phone').value,
        division: document.getElementById('reg-division').value,
        district: document.getElementById('reg-district').value,
        thana: document.getElementById('reg-thana').value,
        facebook: document.getElementById('reg-facebook').value || '',
        helped_count: 0,
        timestamp: Date.now()
      };

      push(ref(db, 'donors'), donorData).then(() => {
        alert("রেজিস্ট্রেশন সফল হয়েছে!");
        regForm.reset();
        btn.disabled = false;
        btn.innerText = "রেজিস্ট্রেশন সম্পন্ন করুন";
        window.switchTab('search');
      });
    });

    // ডাটা রিড
    onValue(ref(db, 'donors'), (snapshot) => {
      const data = snapshot.val();
      if (data) {
        window.allDonors = Object.keys(data).map(key => ({ ...data[key], __backendId: key }));
        document.getElementById('donor-count').textContent = window.allDonors.length;
        document.getElementById('helped-count').textContent = window.allDonors.reduce((sum, d) => sum + (d.helped_count || 0), 0);
        window.searchDonors();
      }
    });

    // সার্চ ফাংশন
    window.searchDonors = function() {
      const blood = document.getElementById('search-blood').value;
      const dist = document.getElementById('search-district').value.toLowerCase();
      const thana = document.getElementById('search-thana').value.toLowerCase();
      const container = document.getElementById('search-results');

      const filtered = window.allDonors.filter(d => 
        (!blood || d.blood === blood) && 
        (!dist || d.district.toLowerCase().includes(dist)) && 
        (!thana || d.thana.toLowerCase().includes(thana))
      );

      container.innerHTML = filtered.length ? filtered.reverse().map(d => `
        <div class="bg-white p-5 rounded-xl shadow border flex flex-col md:flex-row justify-between items-center gap-4 card-hover">
          <div class="flex items-center gap-4 w-full">
            <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center font-bold text-red-600">${d.blood}</div>
            <div>
              <h3 class="font-bold text-gray-800 text-lg">${d.name}</h3>
              <p class="text-sm text-blue-600 font-semibold">📞 ${d.phone}</p>
              <p class="text-xs text-gray-500">📍 ${d.thana || ''}, ${d.district} (${d.division || ''})</p>
              <p class="text-xs text-green-600 font-bold">সহায়তা করেছেন: ${d.helped_count || 0} জনকে</p>
            </div>
          </div>
          <div class="flex gap-2 w-full md:w-auto">
            <a href="tel:${d.phone}" class="flex-1 text-center bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">কল দিন</a>
            <button onclick="window.recordHelp('${d.__backendId}')" class="flex-1 text-center bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">সহায়তা পেলাম</button>
          </div>
        </div>
      `).join('') : '<p class="text-center text-gray-400">কোনো ডোনার পাওয়া যায়নি</p>';
    };

    window.recordHelp = async function(id) {
      const donor = window.allDonors.find(d => d.__backendId === id);
      if (donor) await update(ref(db, 'donors/' + id), { helped_count: (donor.helped_count || 0) + 1 });
    };
  </script>
</body>
</html>
